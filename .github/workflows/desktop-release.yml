name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        default: "1.1.4"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        shell: pwsh
        run: |
          $Version = "${{ github.event.inputs.version }}"
          if (-not $Version) {
            $Version = "${{ github.ref_name }}".TrimStart("v")
          }
          "RELEASE_VERSION=$Version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows installer
        shell: pwsh
        run: .\scripts\build-release.ps1 -Version $env:RELEASE_VERSION

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Planix-v${{ env.RELEASE_VERSION }}-windows-x64-installers
          path: release/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: Planix v${{ env.RELEASE_VERSION }}
          body_path: docs/release-v1.1.4.md
          files: release/*
