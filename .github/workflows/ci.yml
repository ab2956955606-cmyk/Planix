name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npm run test
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m compileall backend
      - run: pytest backend/tests

  desktop-config:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check desktop scaffold
        shell: pwsh
        run: .\scripts\check-desktop-config.ps1
