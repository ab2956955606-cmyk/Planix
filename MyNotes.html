<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyNotes AI</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Segoe UI", sans-serif;
        color: #1d1d1f;
        background: #f4f5f7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(120deg, rgba(10, 132, 255, 0.1), transparent 32%),
          linear-gradient(240deg, rgba(48, 209, 88, 0.09), transparent 30%),
          #f4f5f7;
      }

      #root {
        width: 100%;
      }

      .boot-card {
        width: min(560px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.08);
        backdrop-filter: blur(20px);
      }

      .boot-card h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }

      .boot-card p {
        margin: 0 0 18px;
        color: #6e6e73;
        line-height: 1.7;
      }

      .boot-card code {
        display: block;
        margin-top: 8px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #1d1d1f;
        color: #fff;
        white-space: pre-wrap;
      }

      .boot-card strong {
        color: #0a84ff;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-card">
        <h1>MyNotes AI</h1>
        <p>
          这是一个 <strong>React + TypeScript + Vite</strong> 项目，不能再像旧版纯 HTML 一样直接通过
          <strong>file://</strong> 编译运行。请在项目目录启动开发服务器：
        </p>
        <code>npm install
npm run dev</code>
        <p style="margin-top:18px">
          后端 AI 能力可另开终端运行：
        </p>
        <code>pip install -r requirements.txt
uvicorn backend.app.main:app --reload</code>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
